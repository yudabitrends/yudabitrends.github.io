hugoblox:
  schema: "2.0"

  identity:
    name: "Yuda Bi"
    organization: "TReNDS Center"
    type: person
    tagline: "PhD Candidate | Theoretical Neuroscience | Statistical Physics"
    description: "Yuda Bi - PhD candidate at TReNDS Center (GSU, Georgia Tech, Emory). Research in theoretical neuroscience, neuroimaging, statistical physics, and physics of AI."
