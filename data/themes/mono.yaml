# Pure black & white academic theme
hugoblox:
  meta:
    format: "hugoblox-theme@1"
    name: "Mono"
    vendor: "custom"
    version: "1.0.0"
    license: "MIT"
    description: "Pure black and white minimal academic theme"

  type: "dual"

  light:
    colors:
      primary: "#000000"
      secondary: "#555555"
      neutral: "#111111"
    surfaces:
      background: "#ffffff"
      foreground: "#111111"
      header:
        background: "#ffffff"
        foreground: "#111111"
      footer:
        background: "#ffffff"
        foreground: "#666666"

  dark:
    colors:
      primary: "#ffffff"
      secondary: "#aaaaaa"
      neutral: "#e0e0e0"
    surfaces:
      background: "#111111"
      foreground: "#e0e0e0"
      header:
        background: "#111111"
        foreground: "#e0e0e0"
      footer:
        background: "#111111"
        foreground: "#888888"
