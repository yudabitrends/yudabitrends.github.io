project:
  type: website
  output-dir: docs

website:
  title: "Yuda Bi"
  description: "Ph.D. — Statistical Physics, Information Geometry, Theoretical Neuroscience"
  site-url: "https://yudabitrends.github.io"

  open-graph:
    image: "https://yudabitrends.github.io/files/profile/avatar.jpg"
    image-alt: "Portrait photo of Yuda Bi"
    locale: en_US
    site-name: "Yuda Bi"

  twitter-card:
    image: "https://yudabitrends.github.io/files/profile/avatar.jpg"
    image-alt: "Portrait photo of Yuda Bi"
    card-style: summary_large_image
    # creator: "@REPLACE_ME"   # 有 Twitter 后取消注释并填入用户名
    # site: "@REPLACE_ME"

  # google-analytics: "G-REPLACE_ME"   # 注册 GA4 后取消注释并填入 Measurement ID

  navbar:
    background: light
    left:
      - text: About
        href: index.qmd
      - text: Publications
        href: publications.qmd
      - text: Projects
        href: projects.qmd
      - text: Notes
        href: notes.qmd
      - text: 小说 Novels
        href: novels.qmd
    right:
      - icon: envelope
        href: mailto:ybi3@gsu.edu
      - icon: github
        href: https://github.com/yudabitrends
        target: _blank
      - icon: mortarboard
        href: https://scholar.google.com/citations?user=yclnpogAAAAJ&hl=en
        target: _blank

  page-footer:
    center: |
      Yuda Bi &ensp;|&ensp;
      Built with [Quarto](https://quarto.org)

  search:
    location: navbar
    type: textbox

format:
  html:
    theme:
      - theme.scss
      - cosmo
    css: styles.css
    toc: true
    footnotes-hover: true
    link-external-newwindow: true
    link-external-icon: false
    canonical-url: true
    include-in-header:
      # Google Search Console 验证 — 注册后取消注释并填入验证码
      # - text: |
      #     <meta name="google-site-verification" content="REPLACE_ME">
      - file: _includes/seo-global.html
